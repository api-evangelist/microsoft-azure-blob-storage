meters:
  - name: capacity_gb_month
    unit: GB-month
    aggregation: avg
    dimensions:
      - access_tier
      - redundancy
      - region
      - account
  - name: write_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - access_tier
      - region
      - account
  - name: read_transactions
    unit: transaction
    aggregation: sum
    dimensions:
      - access_tier
      - region
      - account
  - name: data_retrieval
    unit: GB
    aggregation: sum
    dimensions:
      - access_tier
      - region
  - name: data_egress
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - direction
  - name: early_deletion
    unit: GB
    aggregation: sum
    dimensions:
      - access_tier
principles:
  - name: Visibility
    description: Use Azure Cost Management with grouping by Meter Subcategory (Hot/Cool/Cold/Archive)
      and the Storage Account blob inventory report to attribute capacity and transactions per container.
  - name: Allocation
    description: Tag storage accounts and use container-level inventory reports keyed to tags or
      naming conventions for chargeback to applications and teams.
  - name: Optimization
    description: Apply Lifecycle Management policies to tier blobs from Hot to Cool, Cold, then Archive;
      use reserved capacity for stable footprints; consolidate redundancy (LRS vs GRS) to actual durability
      need; avoid early-deletion charges by aligning retention to tier minimums.
  - name: Accountability
    description: Assign per-container cost owners; alert on capacity growth and transaction-rate
      anomalies; review tier mix quarterly against access-pattern telemetry.
