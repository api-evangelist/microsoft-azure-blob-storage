          value: $.
    - name: container-blob-comp-snapshot
      path: /{container}/{blob}?comp=snapshot
      operations:
      - name: snapshotblob
        method: PUT
        description: Azure Blob Storage Snapshot blob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-copy
      path: /{container}/{blob}?comp=copy
      operations:
      - name: copyblob
        method: PUT
        description: Azure Blob Storage Copy blob
        inputParameters:
        - name: x-ms-copy-source
          in: header
          type: string
          required: true
          description: URL of the source blob, up to 2 KiB in length.
        - name: x-ms-access-tier
          in: header
          type: string
          description: The tier to set on the destination blob.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-copy-copyid-copyid
      path: /{container}/{blob}?comp=copy&copyid={copyId}
      operations:
      - name: abortcopyblob
        method: PUT
        description: Azure Blob Storage Abort copy blob
        inputParameters:
        - name: copyId
          in: query
          type: string
          required: true
          description: The copy operation identifier returned by the Copy Blob response.
        - name: x-ms-copy-action
          in: header
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-undelete
      path: /{container}/{blob}?comp=undelete
      operations:
      - name: undeleteblob
        method: PUT
        description: Azure Blob Storage Undelete blob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-tier
      path: /{container}/{blob}?comp=tier
      operations:
      - name: setblobtier
        method: PUT
        description: Azure Blob Storage Set blob tier
        inputParameters:
        - name: x-ms-access-tier
          in: header
          type: string
          required: true
          description: The access tier to set for the blob.
        - name: x-ms-rehydrate-priority
          in: header
