naftiko: 1.0.0-alpha2
info:
  label: Azure Blob Storage REST API
  description: The Azure Blob Storage REST API provides programmatic access to unstructured data storage in Azure. It supports
    operations on the Blob service, containers, and blobs, including block blobs, append blobs, and page blobs. Blobs can
    store any type of text or binary data such as documents, media files, and application installers. Blob Storage is optimized
    for storing massive amounts of unstructured data accessible via HTTP or HTTPS from anywhere in the world.
  tags:
  - Microsoft
  - Azure
  - Blob
  - Storage
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: microsoft-azure-blob-storage
    baseUri: https://mystorageaccount.blob.core.windows.net
    description: Azure Blob Storage REST API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authorization
      value: '{{MICROSOFT_AZURE_BLOB_STORAGE_TOKEN}}'
    resources:
    - name: resource
      path: /
      operations:
      - name: listcontainers
        method: GET
        description: Azure Blob Storage List containers
        inputParameters:
        - name: comp
          in: query
          type: string
          required: true
        - name: prefix
          in: query
          type: string
          description: Filters results to return only containers whose names begin with the specified prefix.
        - name: marker
          in: query
          type: string
          description: Continuation token for retrieving the next page of results. Returned in the NextMarker element of a
            previous response.
        - name: maxresults
          in: query
          type: integer
          description: Maximum number of containers to return in a single response. Defaults to 5000 if not specified.
        - name: include
          in: query
          type: string
          description: Specifies additional datasets to include in the response such as metadata, deleted containers, or system
            containers.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: restype-service-comp-properties
      path: /?restype=service&comp=properties
      operations:
      - name: getblobserviceproperties
        method: GET
        description: Azure Blob Storage Get Blob service properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setblobserviceproperties
        method: PUT
        description: Azure Blob Storage Set Blob service properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: restype-service-comp-stats
      path: /?restype=service&comp=stats
      operations:
      - name: getblobservicestats
        method: GET
        description: Azure Blob Storage Get Blob service stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: restype-service-comp-userdelegationkey
      path: /?restype=service&comp=userdelegationkey
      operations:
      - name: getuserdelegationkey
        method: POST
        description: Azure Blob Storage Get user delegation key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: restype-service-comp-batch
      path: /?restype=service&comp=batch
      operations:
      - name: submitblobbatch
        method: POST
        description: Azure Blob Storage Submit blob batch
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: comp-blobs
      path: /?comp=blobs
      operations:
      - name: findblobsbytags
        method: GET
        description: Azure Blob Storage Find blobs by tags
        inputParameters:
        - name: where
          in: query
          type: string
          required: true
          description: SQL-like filter expression for blob index tags, for example "tagkey"='tagvalue'.
        - name: marker
          in: query
          type: string
          description: Continuation token for pagination.
        - name: maxresults
          in: query
          type: integer
          description: Maximum number of blobs to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container
      path: /{container}
      operations:
      - name: createcontainer
        method: PUT
        description: Azure Blob Storage Create container
        inputParameters:
        - name: restype
          in: query
          type: string
          required: true
        - name: x-ms-blob-public-access
          in: header
          type: string
          description: Specifies whether data in the container may be accessed publicly and the level of access.
        - name: x-ms-default-encryption-scope
          in: header
          type: string
          description: The default encryption scope for the container.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getcontainerproperties
        method: GET
        description: Azure Blob Storage Get container properties
        inputParameters:
        - name: restype
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletecontainer
        method: DELETE
        description: Azure Blob Storage Delete container
        inputParameters:
        - name: restype
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-restype-container-comp-list
      path: /{container}?restype=container&comp=list
      operations:
      - name: listblobs
        method: GET
        description: Azure Blob Storage List blobs
        inputParameters:
        - name: prefix
          in: query
          type: string
          description: Filters results to return only blobs whose names begin with the specified prefix.
        - name: delimiter
          in: query
          type: string
          description: Delimiter character used to traverse a virtual hierarchy of blobs as though it were a file system.
        - name: marker
          in: query
          type: string
          description: Continuation token for pagination.
        - name: maxresults
          in: query
          type: integer
          description: Maximum number of blobs to return.
        - name: include
          in: query
          type: string
          description: Specifies additional datasets to include such as snapshots, metadata, uncommitted blobs, copy, deleted,
            tags, versions, deletedwithversions, immutabilitypolicy,
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-restype-container-comp-metadata
      path: /{container}?restype=container&comp=metadata
      operations:
      - name: getcontainermetadata
        method: GET
        description: Azure Blob Storage Get container metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setcontainermetadata
        method: PUT
        description: Azure Blob Storage Set container metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-restype-container-comp-acl
      path: /{container}?restype=container&comp=acl
      operations:
      - name: getcontaineracl
        method: GET
        description: Azure Blob Storage Get container ACL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setcontaineracl
        method: PUT
        description: Azure Blob Storage Set container ACL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-restype-container-comp-lease
      path: /{container}?restype=container&comp=lease
      operations:
      - name: leasecontainer
        method: PUT
        description: Azure Blob Storage Lease container
        inputParameters:
        - name: x-ms-lease-action
          in: header
          type: string
          required: true
          description: The lease action to perform.
        - name: x-ms-lease-duration
          in: header
          type: integer
          description: Duration of the lease in seconds. Set to -1 for an infinite lease, or between 15 and 60 seconds for
            a fixed-duration lease.
        - name: x-ms-proposed-lease-id
          in: header
          type: string
          description: Proposed lease ID in GUID format.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-restype-container-comp-undelete
      path: /{container}?restype=container&comp=undelete
      operations:
      - name: restorecontainer
        method: PUT
        description: Azure Blob Storage Restore container
        inputParameters:
        - name: x-ms-deleted-container-name
          in: header
          type: string
          required: true
          description: The name of the deleted container to restore.
        - name: x-ms-deleted-container-version
          in: header
          type: string
          required: true
          description: The version of the deleted container to restore.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob
      path: /{container}/{blob}
      operations:
      - name: putblob
        method: PUT
        description: Azure Blob Storage Put blob
        inputParameters:
        - name: x-ms-blob-type
          in: header
          type: string
          required: true
          description: The type of blob to create.
        - name: Content-Length
          in: header
          type: integer
          description: The length of the request body in bytes. Required for page blobs (set to 0 with x-ms-blob-content-length
            for the actual size).
        - name: Content-Type
          in: header
          type: string
          description: The MIME content type of the blob.
        - name: x-ms-blob-content-type
          in: header
          type: string
          description: The content type to set for the blob.
        - name: x-ms-access-tier
          in: header
          type: string
          description: The tier to set on the blob.
        - name: x-ms-blob-content-length
          in: header
          type: integer
          description: Required for page blobs. Specifies the maximum size for the page blob, up to 8 TiB. Must be aligned
            to a 512-byte boundary.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getblob
        method: GET
        description: Azure Blob Storage Get blob
        inputParameters:
        - name: Range
          in: header
          type: string
          description: Return only the bytes of the blob in the specified range, for example bytes=0-1023.
        - name: snapshot
          in: query
          type: string
          description: The snapshot identifier. When specified, the operation returns the snapshot of the blob.
        - name: versionid
          in: query
          type: string
          description: The version ID. When specified, the operation returns the specified version of the blob.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteblob
        method: DELETE
        description: Azure Blob Storage Delete blob
        inputParameters:
        - name: x-ms-delete-snapshots
          in: header
          type: string
          description: Required if the blob has associated snapshots. Specifies whether to delete the blob and all snapshots
            (include) or only the snapshots (only).
        - name: snapshot
          in: query
          type: string
          description: The snapshot identifier. When specified, only the snapshot is deleted.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-metadata
      path: /{container}/{blob}?comp=metadata
      operations:
      - name: getblobmetadata
        method: GET
        description: Azure Blob Storage Get blob metadata
