        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setblobmetadata
        method: PUT
        description: Azure Blob Storage Set blob metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-properties
      path: /{container}/{blob}?comp=properties
      operations:
      - name: setblobhttpheaders
        method: PUT
        description: Azure Blob Storage Set blob HTTP headers
        inputParameters:
        - name: x-ms-blob-content-type
          in: header
          type: string
          description: The MIME content type of the blob.
        - name: x-ms-blob-content-encoding
          in: header
          type: string
          description: The content encoding of the blob.
        - name: x-ms-blob-content-language
          in: header
          type: string
          description: The content language of the blob.
        - name: x-ms-blob-cache-control
          in: header
          type: string
          description: The cache control directive for the blob.
        - name: x-ms-blob-content-disposition
          in: header
          type: string
          description: The content disposition of the blob.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-tags
      path: /{container}/{blob}?comp=tags
      operations:
      - name: getblobtags
        method: GET
        description: Azure Blob Storage Get blob tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setblobtags
        method: PUT
        description: Azure Blob Storage Set blob tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: container-blob-comp-lease
      path: /{container}/{blob}?comp=lease
      operations:
      - name: leaseblob
        method: PUT
        description: Azure Blob Storage Lease blob
        inputParameters:
        - name: x-ms-lease-action
          in: header
          type: string
          required: true
          description: The lease action to perform.
        outputRawFormat: json
        outputParameters:
        - name: result
