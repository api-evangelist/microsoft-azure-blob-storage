        - name: x-ms-range
          in: header
          type: string
          required: true
          description: The byte range for the page write operation. Must be aligned to 512-byte boundaries. Format is bytes=startByte-endByte.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
