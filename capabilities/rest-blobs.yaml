  description: 'Azure Blob Storage REST API — Blobs. 18 operations. Lead operation: Azure Blob Storage Put blob. Self-contained
    Naftiko capability covering one Azure Blob Storage business surface.'
  tags:
  - Azure Blob Storage
  - Blobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AZURE_BLOB_STORAGE_API_KEY: AZURE_BLOB_STORAGE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-blobs
    baseUri: https://{accountName}.blob.core.windows.net
    description: Azure Blob Storage REST API — Blobs business capability. Self-contained, no shared references.
    resources:
    - name: container-blob
      path: /{container}/{blob}
      operations:
      - name: putblob
        method: PUT
        description: Azure Blob Storage Put blob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: x-ms-blob-type
          in: header
          type: string
          description: The type of blob to create.
          required: true
        - name: Content-Length
          in: header
          type: integer
          description: The length of the request body in bytes. Required for page blobs (set to 0 with x-ms-blob-content-length
            for the actual size).
        - name: Content-Type
          in: header
          type: string
          description: The MIME content type of the blob.
        - name: x-ms-blob-content-type
          in: header
          type: string
          description: The content type to set for the blob.
        - name: x-ms-access-tier
          in: header
          type: string
          description: The tier to set on the blob.
        - name: x-ms-blob-content-length
          in: header
          type: integer
          description: Required for page blobs. Specifies the maximum size for the page blob, up to 8 TiB. Must be aligned
            to a 512-byte boundary.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: getblob
        method: GET
        description: Azure Blob Storage Get blob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Range
          in: header
          type: string
          description: Return only the bytes of the blob in the specified range, for example bytes=0-1023.
        - name: snapshot
          in: query
          type: string
          description: The snapshot identifier. When specified, the operation returns the snapshot of the blob.
        - name: versionid
          in: query
          type: string
          description: The version ID. When specified, the operation returns the specified version of the blob.
      - name: getblobproperties
        method: HEAD
        description: Azure Blob Storage Get blob properties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteblob
