        description: Azure Blob Storage Delete blob
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: x-ms-delete-snapshots
          in: header
          type: string
          description: Required if the blob has associated snapshots. Specifies whether to delete the blob and all snapshots
            (include) or only the snapshots (only).
        - name: snapshot
          in: query
          type: string
          description: The snapshot identifier. When specified, only the snapshot is deleted.
