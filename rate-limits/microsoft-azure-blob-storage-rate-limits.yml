specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Azure Blob Storage
providerId: microsoft-azure-blob-storage
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Storage
  - Microsoft Azure
description: Azure Storage publishes scalability targets per storage account and per blob. Limits are
  not plan-tier scoped; they are account-type scoped (standard general-purpose v2, premium block blob).
  When targets are exceeded, the service returns 503 (Server Busy) or 500 (Operation Timeout). Higher
  targets are available by support request.
sources:
  - https://learn.microsoft.com/en-us/azure/storage/blobs/scalability-targets
  - https://learn.microsoft.com/en-us/azure/storage/common/scalability-targets-standard-account
  - https://learn.microsoft.com/en-us/azure/storage/blobs/scalability-targets-premium-block-blobs
headers:
  requestId: x-ms-request-id
  clientRequestId: x-ms-client-request-id
responseCodes:
  serverBusy: 503
  operationTimeout: 500
limits:
  - name: Standard storage account ingress (US/EU)
    scope: account
    metric: bandwidth
    limit: '60 Gbps'
    timeFrame: second
  - name: Standard storage account egress (US/EU)
    scope: account
    metric: bandwidth
    limit: '120 Gbps'
    timeFrame: second
  - name: Standard storage account max request rate
    scope: account
    metric: requests_per_second
    limit: 20000
    timeFrame: second
    notes: Default scalability target across all blob/queue/table/file operations.
  - name: Single blob max throughput
    scope: blob
    metric: requests_per_second
    limit: 500
    timeFrame: second
    notes: A single blob is targeted at ~500 requests/sec regardless of tier.
  - name: Premium block blob ingress
    scope: account
    metric: bandwidth
    limit: 'see Azure docs (premium block blob)'
  - name: Premium block blob egress
    scope: account
    metric: bandwidth
    limit: 'see Azure docs (premium block blob)'
policies:
  - name: Backoff on 503/500
    description: When Azure Storage returns 503 (Server Busy) or 500 (Operation Timeout), back off
      exponentially with jitter and retry.
  - name: Partition by blob name
    description: Distribute high-rate writes across partitions by varying the blob-name prefix to
      avoid single-partition hot-spotting (~500 RPS per blob/partition).
  - name: Increase via support
    description: Workloads requiring hundreds of thousands of RPS or petabytes can request higher
      account targets via Azure support.
  - name: Use multiple accounts
    description: Shard workloads across multiple storage accounts when account-level limits become
      the bottleneck.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
